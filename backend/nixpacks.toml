# Configuración Nixpacks para Railway
# Railway detecta Python y usa este build
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "postgresql"]

[phases.install]
cmds = ["python -m venv /opt/venv", "/opt/venv/bin/pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput --clear 2>/dev/null || true"]

[start]
cmd = "python manage.py migrate --noinput && gunicorn core.wsgi --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 60"
